{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnyxChips - Онлайн Казино</title>
    <link rel="stylesheet" href="{% static 'main/slots/style.css' %}">
    <link rel="stylesheet" href="{% static 'main/slots/daily-bonus.css' %}">
    <link rel="stylesheet" href="{% static 'main/slots/loading-screen.css' %}">
    <link rel="stylesheet" href="{% static 'main/slots/page-transitions.css' %}">
    <link rel="stylesheet" href="{% static 'main/slots/mobile.css' %}">
    <script src="{% static 'main/slots/loading-screen.js' %}"></script>
</head>
<body>
    {% if user.is_authenticated %}
        {% include 'main/components/level_bar.html' %}
    {% endif %}

    <div class="site-wrapper">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="logo">
                <img src="{% static 'main/slots/onyxchips-logo.png' %}" alt="OnyxChips" class="logo-img">
            </div>
            <div class="top-buttons">
                <a href="{% url 'profile' %}" class="top-icon-btn">
                    <img src="{% static 'main/slots/account-icon.png' %}" class="top-icon" onerror="this.style.display='none'">
                </a>
                <a href="{% url 'settings' %}" class="top-icon-btn">
                    <img src="{% static 'main/slots/settings-icon.png' %}" class="top-icon" onerror="this.style.display='none'">
                </a>
                <a href="{% url 'logout' %}" class="top-icon-btn">
                    <img src="{% static 'main/slots/logout-icon.png' %}" class="top-icon" onerror="this.style.display='none'">
                </a>
            </div>
        </div>

        <!-- Полоска -->
        <div class="line"></div>

        <!-- Заголовок -->
        <div class="main-title">
            <h1>ONYXCHIPS</h1>
            <p>ВЫБЕРИ СВОЮ ИГРУ</p>
        </div>

        <!-- Кнопки игр -->
        <div class="game-buttons">
            <a href="#" class="game-btn">
                <img src="{% static 'main/slots/roulette-icon.png' %}" alt="Рулетка" class="game-img">
                <div class="game-label">РУЛЕТКА</div>
            </a>

            <a href="{% url 'slots' %}" class="game-btn">
                <img src="{% static 'main/slots/slots-icon.png' %}" alt="Слоты" class="game-img">
                <div class="game-label">СЛОТЫ</div>
            </a>

            <a href="#" class="game-btn">
                <img src="{% static 'main/slots/blackjack-icon.png' %}" alt="Блэкджек" class="game-img">
                <div class="game-label">БЛЭКДЖЕК</div>
            </a>
        </div>
    </div>

    <script src="{% static 'main/slots/theme-switcher.js' %}"></script>
    <script src="{% static 'main/slots/page-transitions.js' %}"></script>
    {% if user.is_authenticated %}
        <script src="{% static 'main/slots/daily-bonus.js' %}"></script>
    {% endif %}
</body>
</html>
